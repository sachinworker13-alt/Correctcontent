
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;height:640px}
.left{display:flex;flex-direction:column;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg) 0 0 var(--border-radius-lg);overflow:hidden}
.right{display:flex;flex-direction:column;border:0.5px solid var(--color-border-tertiary);border-left:none;border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0;overflow:hidden}
.phead{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-shrink:0}
.phead span{font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.04em;text-transform:uppercase}
.btn-row{display:flex;gap:6px}
.btn{padding:5px 12px;font-size:12px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer}
.btn:hover{background:var(--color-background-secondary)}
.btn.go{border-color:var(--color-border-primary)}
textarea{flex:1;padding:14px;font-size:13px;line-height:1.8;font-family:var(--font-sans);background:transparent;border:none;color:var(--color-text-primary);resize:none;outline:none;width:100%}
.tabs-row{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.tab{flex:1;padding:8px;font-size:12px;font-weight:500;border:none;background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;letter-spacing:.03em}
.tab.on{background:var(--color-background-primary);color:var(--color-text-primary)}
.copy-btn{padding:8px 16px;font-size:12px;font-weight:500;border:none;border-left:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;flex-shrink:0}
.copy-btn:hover{background:var(--color-background-primary)}
.preview-scroll{flex:1;overflow-y:auto;padding:18px 20px}
.preview-scroll h1{font-size:19px;font-weight:500;color:var(--color-text-primary);margin:0 0 14px;line-height:1.4}
.preview-scroll h2{font-size:15px;font-weight:500;color:var(--color-text-primary);margin:20px 0 8px;line-height:1.4}
.preview-scroll p{font-size:13px;line-height:1.85;color:var(--color-text-primary);margin-bottom:10px}
.preview-scroll ol{padding-left:20px;margin-bottom:12px}
.preview-scroll li{font-size:13px;line-height:1.85;color:var(--color-text-primary);margin-bottom:6px}
.preview-scroll strong{font-weight:500}
.code-scroll{flex:1;overflow-y:auto;padding:14px;font-family:var(--font-mono);font-size:11px;line-height:1.7;color:var(--color-text-secondary);white-space:pre-wrap;word-break:break-all;background:var(--color-background-secondary)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--color-text-secondary);font-size:13px}
.notice{font-size:11px;color:var(--color-text-secondary);padding:6px 14px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-shrink:0}
</style>

<h2 class="sr-only">Content formatter — paste raw text left, get formatted HTML right</h2>

<div class="wrap">
  <div class="left">
    <div class="phead">
      <span>Raw content</span>
      <div class="btn-row">
        <button class="btn" onclick="clearAll()">Clear</button>
        <button class="btn go" onclick="doFormat()">Format →</button>
      </div>
    </div>
    <textarea id="inp" placeholder="Paste raw content here then click Format.

Rules (zero words changed):
• 1st line → <h1>
• Lines with ¿…? or …? → <h2>
• Emoji/★ led lines → <h2>
• 1. 2. 3. lines → <ol><li>
• Phone numbers → <strong>
• Everything else → <p>

Copy HTML button gives full HTML with all tags."></textarea>
  </div>

  <div class="right">
    <div class="tabs-row">
      <button class="tab on" id="tab-p" onclick="switchTab('preview')">Preview</button>
      <button class="tab" id="tab-h" onclick="switchTab('html')">HTML code</button>
      <button class="copy-btn" id="cbtn" onclick="doCopy()">Copy HTML</button>
    </div>
    <div id="preview-pane" class="preview-scroll">
      <div class="empty"><i class="ti ti-file-text" style="font-size:28px;opacity:.35" aria-hidden="true"></i><span>Formatted output appears here</span></div>
    </div>
    <div id="html-pane" class="code-scroll" style="display:none"></div>
    <div class="notice" id="notice"></div>
  </div>
</div>

<script>
let generatedHTML = '';
let currentTab = 'preview';

function switchTab(t) {
  currentTab = t;
  document.getElementById('preview-pane').style.display = t === 'preview' ? '' : 'none';
  document.getElementById('html-pane').style.display = t === 'html' ? '' : 'none';
  document.getElementById('tab-p').className = 'tab' + (t === 'preview' ? ' on' : '');
  document.getElementById('tab-h').className = 'tab' + (t === 'html' ? ' on' : '');
  document.getElementById('cbtn').textContent = t === 'html' ? 'Copy HTML' : 'Copy HTML';
}

function clearAll() {
  document.getElementById('inp').value = '';
  document.getElementById('preview-pane').innerHTML = '<div class="empty"><i class="ti ti-file-text" style="font-size:28px;opacity:.35" aria-hidden="true"></i><span>Formatted output appears here</span></div>';
  document.getElementById('html-pane').textContent = '';
  document.getElementById('notice').textContent = '';
  generatedHTML = '';
}

function boldPhones(text) {
  return text
    .replace(/(\+\d{1,3}-\d{3}-\d{3}-\d{4})/g, '<strong>$1</strong>')
    .replace(/(\+\d{1,3}-\d{3}-\d{2}-\d{4})/g, '<strong>$1</strong>')
    .replace(/(\(\+1\)\s*[\d][\d\s\-\.]{5,}\d)/g, '<strong>$1</strong>')
    .replace(/(\+1[\s\-]\(?\d{3}\)?[\s\-]\d{3}[\s\-]\d{4})/g, '<strong>$1</strong>')
    .replace(/(\+52-\d{3}-\d{3}-\d{4})/g, '<strong>$1</strong>')
    .replace(/(\+54-\d{3}-\d{3}-\d{4})/g, '<strong>$1</strong>');
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function processLine(line) {
  return boldPhones(escapeHTML(line));
}

function isQuestion(line) {
  return (line.includes('?') || line.includes('¿')) && line.length < 200 && !/^\(/.test(line);
}

function isSectionHead(line) {
  if (/^[\u{1F000}-\u{1FFFF}\u2600-\u27BF\u{1F300}-\u{1F9FF}]/u.test(line)) return true;
  if (/^[★✦❖◆•]\s/.test(line)) return true;
  if (line.length < 90 && line === line.toUpperCase() && /[A-Z]{3,}/.test(line)) return true;
  return false;
}

function doFormat() {
  const raw = document.getElementById('inp').value.trim();
  if (!raw) return;

  const lines = raw.split(/\n/).map(l => l.trim()).filter(Boolean);
  let out = '';
  let numberedBuf = [];
  let firstDone = false;

  function flushList() {
    if (!numberedBuf.length) return;
    out += '<ol>\n';
    numberedBuf.forEach(item => {
      const content = item.replace(/^\d+\.\s*/, '');
      out += `  <li>${processLine(content)}</li>\n`;
    });
    out += '</ol>\n';
    numberedBuf = [];
  }

  lines.forEach(line => {
    if (!firstDone) {
      firstDone = true;
      out += `<h1>${processLine(line)}</h1>\n`;
      return;
    }

    if (/^\d+\.\s/.test(line)) {
      numberedBuf.push(line);
      return;
    } else {
      flushList();
    }

    if (isQuestion(line)) {
      out += `<h2>${processLine(line)}</h2>\n`;
      return;
    }

    if (isSectionHead(line)) {
      out += `<h2>${processLine(line)}</h2>\n`;
      return;
    }

    out += `<p>${processLine(line)}</p>\n`;
  });
  flushList();

  generatedHTML = out;

  // Count tags for notice
  const h1s = (out.match(/<h1>/g)||[]).length;
  const h2s = (out.match(/<h2>/g)||[]).length;
  const ps  = (out.match(/<p>/g)||[]).length;
  document.getElementById('notice').textContent = `${h1s} H1 · ${h2s} H2 headings · ${ps} paragraphs detected`;

  document.getElementById('preview-pane').innerHTML = out;
  document.getElementById('html-pane').textContent = out;
}

function doCopy() {
  if (!generatedHTML) {
    document.getElementById('notice').textContent = 'Format your content first!';
    return;
  }
  navigator.clipboard.writeText(generatedHTML).then(() => {
    const b = document.getElementById('cbtn');
    b.textContent = 'Copied!';
    setTimeout(() => b.textContent = 'Copy HTML', 1800);
  }).catch(() => {
    const area = document.createElement('textarea');
    area.value = generatedHTML;
    document.body.appendChild(area);
    area.select();
    document.execCommand('copy');
    document.body.removeChild(area);
    const b = document.getElementById('cbtn');
    b.textContent = 'Copied!';
    setTimeout(() => b.textContent = 'Copy HTML', 1800);
  });
}
</script>
